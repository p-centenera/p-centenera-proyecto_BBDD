
<!-- Barra de navegacion principal de la aplicacion. -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <!-- La marca solo se muestra cuando se recibe en el contexto. -->
    {% if brand_name %}
        <span class="navbar-brand">{{ brand_name }}</span>
    {% endif %}

    <div class="collapse navbar-collapse" id="navbarNav">
        <!-- Enlaces a cada vista funcional del proyecto. -->
        <ul class="navbar-nav">
            <li class="nav-item {% if request.path == '/' %} active {% endif %}">
                <a class="nav-link" href="{% url 'home' %}">Home <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item {% if request.path == '/formulario/' %} active {% endif %}">
                <a class="nav-link" href="{% url 'formularioConsultaEuribor' %}">Consulta Euribor</a>
            </li>
            <li class="nav-item {% if request.path == '/euribor/' %} active {% endif %}">
                <a class="nav-link" href="{% url 'euribor' %}">Gráfica euribor</a>
            </li>
            <li class="nav-item {% if request.path == '/grafica/' %} active {% endif %}">
                <a class="nav-link" href="{% url 'grafica' %}">Gráfica Euribor mes a mes</a>
            </li>
           
        </ul>
    </div>
</nav>
